<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">




    <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef> Username </th>
        <td mat-cell *matCellDef="let user"> {{user.username}} </td>
    </ng-container>


    <ng-container matColumnDef="names">
        <th mat-header-cell *matHeaderCellDef> Names </th>
        <td mat-cell *matCellDef="let user"> {{user.names}} </td>
    </ng-container>


    <ng-container matColumnDef="lastnames">
        <th mat-header-cell *matHeaderCellDef> Lastnames </th>
        <td mat-cell *matCellDef="let user"> {{user.lastnames}} </td>
    </ng-container>


    <ng-container matColumnDef="age">
        <th mat-header-cell *matHeaderCellDef> Edad </th>
        <td mat-cell *matCellDef="let user"> {{user.age}} </td>
    </ng-container>


    <ng-container matColumnDef="gender">
        <th mat-header-cell *matHeaderCellDef> Genero </th>
        <td mat-cell *matCellDef="let user"> {{user.gender}} </td>
    </ng-container>


    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let user"> {{user.gender}} </td>
    </ng-container>


    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
